name: Release workflow

on:
  release:
    types: [published]

  pull_request:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ${{ matrix.operating-system }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - operating-system: ubuntu-22.04
            targets: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl,aarch64-unknown-linux-gnu,aarch64-unknown-linux-musl
          - operating-system: windows-latest
            targets: aarch64-pc-windows-msvc,x86_64-pc-windows-msvc
          - operating-system: macos-latest
            targets: x86_64-apple-darwin,aarch64-apple-darwin
      fail-fast: false
    env:
      pact_do_not_track: true
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.targets }}

      - name: Rust caching
        uses: Swatinem/rust-cache@v2

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@v3

      - name: Install LLVM
        run: choco install -y llvm
        if: runner.os == 'Windows'
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Cargo flags
        id: cargo-flags
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" = "release" ]]; then
            echo "flags=--release" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi 
      - name: Build sync-message-test plugin
        run: ./release.sh ${{ runner.os }} ${{ steps.cargo-flags.outputs.flags }}
        shell: bash
      - name: Upload Release Assets
        if: |
          startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release_artifacts/*
          file_glob: true
          tag: ${{ github.ref }}

  build-manifest:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Validate Manifest
        run: |
          RELEASE_VERSION=$(echo "${{ github.ref }}" | sed 's/^refs\/tags\///')
          PLUGIN_VERSION=$(cat pact-plugin.json | jq -r '.version')
          if [[ "${RELEASE_VERSION}" != "${PLUGIN_VERSION}"* ]]; then
            echo "Release version $RELEASE_VERSION is not the same as plugin version $PLUGIN_VERSION"
            exit 1
          fi
      - name: Upload Manifest
        if: |
          startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: pact-plugin.json
          file_glob: true
          tag: ${{ github.ref }}
